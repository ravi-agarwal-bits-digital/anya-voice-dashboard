name: Dashboard checks

on:
  pull_request:
    paths:
      - 'index.html'
      - 'js/**'
      - 'css/dashboard.css'
      - 'assets/xlsx.full.min.js'
      - 'tests/dashboard-smoke.test.js'
      - 'tests/workbook-worker.test.js'
      - '.github/workflows/dashboard-checks.yml'
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'js/**'
      - 'css/dashboard.css'
      - 'assets/xlsx.full.min.js'
      - 'tests/dashboard-smoke.test.js'
      - 'tests/workbook-worker.test.js'

permissions:
  contents: read

jobs:
  dashboard-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run dashboard smoke tests
        run: node tests/dashboard-smoke.test.js
      - name: Run workbook worker tests
        run: node tests/workbook-worker.test.js
