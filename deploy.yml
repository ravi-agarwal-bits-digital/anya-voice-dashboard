name: 🚀 Process Voice Analytics & Publish

on:
  push:
    paths:
      - 'data/voice_analytics_*.xlsx'
      - 'BITS_KAI_Master_Dashboard.html'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: ✅ Verify dashboard exists
        run: |
          if [ ! -f "BITS_KAI_Master_Dashboard.html" ]; then
            echo "❌ Dashboard file missing!"
            exit 1
          fi
          echo "✅ Dashboard ready to publish"

      - name: 📊 Process Excel (optional)
        run: |
          echo "📈 Excel file detected: ${{ github.event.head_commit.modified }}"
          echo "✅ Dashboard will use latest Excel on next load"

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          cname: ''  # Remove if using custom domain
          force_orphan: true

      - name: ✨ Publish complete
        run: |
          echo "🎉 Dashboard published!"
          echo "📍 Live at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
